
[project]
name = "fastapi-recipe-ddd"
version = "0.1.0"
description = "FastAPI recipe example"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "uvicorn",
    "watchfiles",
    "dijay",
    "uuid>=1.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.setuptools]
packages = ["src"]

[tool.uv.sources]
dijay = { workspace = true }

[dependency-groups]
dev = ["uvicorn>=0.41.0"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
